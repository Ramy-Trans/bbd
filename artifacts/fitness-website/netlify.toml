# Netlify config for Big Bad Dawy fitness website
# In Netlify UI: set "Base directory" to the REPO ROOT (leave blank)
# This file already configures the correct build settings.

[build]
  command   = "pnpm --filter @workspace/fitness-website run build:netlify"
  publish   = "artifacts/fitness-website/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200
